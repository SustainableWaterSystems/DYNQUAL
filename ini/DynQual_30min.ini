[globalOptions]
# Set the input directory map in an absolute path. 
# - The input forcing and parameter directories will be relative to this.
inputDir = /gpfs/work4/0/dynql/input_30min/

# Set the output directory in an absolute path.
outputDir = /scratch-shared/dynql/test_30min/

#Global Run
cloneAreas = Global

# Map of clone (must be provided in PCRaster maps)
# - spatial resolution and coverage are based on this map:
cloneMap = clone_maps/RhineMeuse30min.clone.map
#cloneMap = clone_maps/clone_global_30min.map

# The area/ landmask of interest:
# If None, area/landmask is limited for cells with ldd value.
landmask = clone_maps/RhineMeuse30min.landmask.map
#landmask = clone_maps/landmask_global_30min.map

# netcdf attributes for output files:
institution = Department of Physical Geography, Utrecht University
title       = DynQual Output (run coupled with PCR-GLOBWB2)
description = Example setup with 0.5 degree resolution, daily timestep (Edward R. Jones)

startTime = 2000-01-01
endTime   = 2000-01-10
# Format: YYYY-MM-DD
# The model runs on the daily time step.

# spinning up options
maxSpinUpsInYears = 0
minConvForTotlSto = 0.5
minConvForSoilSto = 0.5
minConvForGwatSto = 0.5
minConvForChanSto = 0.5

# option to automatically merge output files (needed for parallel runs)
with_merging = False

[meteoOptions]
# This section is for providing the meteorological input required for PCR-GLOBWB/DynQual runs
# - Ensure correct units! precipitation (m day-1), temperature (C), refET (m day-1), cloud cover (%), radiation (W m-2), vapour pressure (hPa)

# Set the forcing temperature and precipitation files (relative to inputDir)
precipitationNC = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_pr_global_daily_1901_2024.nc
precipitationVariableName = pr
precipitationCorrectionFactor = 1

temperatureNC = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_tas_global_daily_1901_2024.nc
temperatureVariableName = tas

# Method to calculate referencePotETP (reference potential evaporation+transpiration)
# options are "Hamon" and "Input" ; If "Input", the netcdf input file must be given
referenceETPotMethod = Hamon
refETPotFileNC = None
referenceETPotVariableName = potentialEvaporation

#Set the additional forcing needed for water temperature module (e.g. cloudcover, radiation and vapor pressure files)
cloudcoverNC  = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/cru_ts4.09_obsclim_cld_global_monthly_1901_2024.nc
radiationNC   = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_rsds_global_daily_1901_2024.nc
vaporNC       = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/cru_ts4.09_obsclim_vap_global_monthly_1901_2024.nc
annualAvgTNC  = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_tas_global_annual_1901_2024.nc
sunhoursTable = /gpfs/work4/0/dynql/input/forcing/historical/sunhoursfrac.tbl

#Set the additional forcing needed for TSS module (daily tmin and tmax)
tMinFileNC   = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_tasmin_global_daily_1901_2024.nc
tMaxFileNC   = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_tasmax_global_daily_1901_2024.nc
annualSumPNC = /gpfs/work4/0/dynql/input/forcing/historical/20crv3-ERA5/20crv3-era5_obsclim_pr_global_annualSum_1901_2024.nc

[landSurfaceOptions]
debugWaterBalance = True
numberOfUpperSoilLayers = 2

# soil and parameters
# - they are used for all land cover types, unless they are are defined in certain land cover type options 
#   (e.g. different/various soil types for agriculture areas)  
topographyNC      = landSurface/topography_parameters_30min.nc
soilPropertiesNC  = landSurface/soilProperties30ArcMin.nc

# netcdf time series for historical expansion of irrigation areas (unit: hectares). 
# Note: The resolution of this map must be consisten with the resolution of cellArea. 
historicalIrrigationArea = waterUse/irrigationArea30ArcMin.nc

#Sediment delivery files
soilFractionNC = landSurface/soil_fraction_30min.nc
ndviNC = landSurface/ndvi_30min.nc

[waterDemandOptions]
# option to calculate/include water use for irrigation purpose
includeIrrigation = True
# if True, there are four land cover types defined: forest,grassland,irrPaddy,irrNonPaddy
# if False, two (natural) land cover types defined: forest,grassland

# default irrigation efficiency a pcraster map/value defining irrigation efficiency (dimensionless) - optional
# - note that it is also possible to define speficic-land-cover irrigation efficiency in each 'landCover' Options 
irrigationEfficiency = waterUse/irrigationEfficiency.map

# option to include non irrigation water demands
includeDomesticWaterDemand       = True
includeIndustryWaterDemand       = False
includeLivestockWaterDemand      = True
includeManufactureWaterDemand    = True
includeThermoelectricWaterDemand = True

# domestic, industrial and livestock water demand data (unit must be in m.day-1)
domesticWaterDemandFile       = waterUse/domestic_water_demand_1960-2019_30min.nc
industryWaterDemandFile       = waterUse/industry_water_demand_1960-2019_30min.nc
livestockWaterDemandFile      = waterUse/livestock_water_demand_1960-2019_30min.nc
manufactureWaterDemandFile    = waterUse/manufacturing_water_demand_1960-2019_30min.nc
thermoelectricWaterDemandFile = None


[waterManagementOptions]
# using QUAlloc (or not)
using_qualloc                  = False
configuration_file_for_qualloc = None

# not using QUAlloc (using_qualloc = False)
# extra water management related information should be provided:
#
## limiting groundwater abstractions
## - limitAbstraction: limits the use of non-renewable (fossil) groundwater
limitAbstraction                  = False
## - limitFossilGroundWaterAbstraction: 
limitFossilGroundWaterAbstraction = False
## - pumpingCapacityNC: annual pumping capacity for each region (unit: billion cubic meter per year), should be given in a netcdf file
pumpingCapacityNC                 = groundwater/regional_abstraction_limit.nc

## desalination water supply (maximum/potential/capacity)
desalinationWater = waterUse/desalination_GWI_1960-2019_mday_30min.nc

## zonal IDs at which allocation of desalined water, surface water, and groundwater sources are performed
## (if not defined, only local (pixel-scale) water availability is considered)
allocationSegmentsForDesalinatedWaterSource = waterUse/abstraction_zones_30min_30min.nc
allocationSegmentsForSurfaceWaterSource     = waterUse/abstraction_zones_30min_30min.nc
allocationSegmentsForGroundwaterSource      = waterUse/abstraction_zones_30min_30min.nc

## limits for local groundwater abstraction values
## - limit for total groundwater abstraction (m/day)
maximumDailyGroundwaterAbstraction       = 0.050
## - limit for non-renewable groundwater abstraction (m/day)
maximumDailyFossilGroundwaterAbstraction = 0.020

## maps defining the partitioning of groundwater - surface water source
## - predefined surface water - groundwater partitioning for irrigation demand (e.g. based on Siebert, Global Map of Irrigation Areas version 5)
irrigationSurfaceWaterAbstractionFractionData           = waterUse/AEI_SWFRAC.nc
## -- quality map
irrigationSurfaceWaterAbstractionFractionDataQuality    = waterUse/AEI_QUAL.nc

## - threshold values defining the preference for surface water source for irrigation purpose
## -- threshold to maximize surface water irrigation use (cells with irrSurfaceWaterAbstractionFraction above this will prioritize irrigation surface water use)
threshold_to_maximize_irrigation_surface_water          = 0.50
## -- threshold to minimize fossil water withdrawal for irrigation (cells with irrSurfaceWaterAbstractionFraction below this have no fossil withdrawal for irrigation)
threshold_to_minimize_fossil_groundwater_irrigation     = 0.70

## - predefined surface water - groundwater partitioning for non irrigation demand (e.g. based on McDonald, 2014)
maximumNonIrrigationSurfaceWaterAbstractionFractionData = waterUse/max_city_sw_fraction.nc


[forestOptions]
name = forest
debugWaterBalance = True

# snow module properties
snowModuleType      =  Simple
freezingT           = -0.0
degreeDayFactor     =  0.0025
snowWaterHoldingCap =  0.1
refreezingCoeff     =  0.05

# other paramater values
minTopWaterLayer = 0.0
minCropKC        = 0.2
minInterceptCap  = 0.0002

landCoverMapsNC = landSurface/landCover/naturalTall/forestProperties.nc 
# If NC file is not provided, we have to provide the following pcraster maps:
fracVegCover      = landSurface/landCover/naturalTall/vegf_tall.nc
minSoilDepthFrac  = landSurface/landCover/naturalTall/minf_tall_permafrost.nc
maxSoilDepthFrac  = landSurface/landCover/naturalTall/maxf_tall.nc
rootFraction1     = landSurface/landCover/naturalTall/rfrac1_tall.nc
rootFraction2     = landSurface/landCover/naturalTall/rfrac2_tall.nc
maxRootDepth      = 1.0

# Parameters for the Arno's scheme:
arnoBeta = None
# If arnoBeta is defined, the soil water capacity distribution is based on this.
# If arnoBeta is NOT defined, maxSoilDepthFrac must be defined such that arnoBeta will be calculated based on maxSoilDepthFrac and minSoilDepthFrac.

cropCoefficientNC = landSurface/landCover/naturalTall/cropCoefficientForest.nc
interceptCapNC    = landSurface/landCover/naturalTall/interceptCapInputForest.nc
coverFractionNC   = landSurface/landCover/naturalTall/coverFractionInputForest.nc

# initial conditions:
interceptStorIni = ini_states/interceptStor_forest_1999-12-31.map
snowCoverSWEIni  = ini_states/snowCoverSWE_forest_1999-12-31.map
snowFreeWaterIni = ini_states/snowFreeWater_forest_1999-12-31.map
topWaterLayerIni = ini_states/topWaterLayer_forest_1999-12-31.map
storUppIni       = ini_states/storUpp_forest_1999-12-31.map
storLowIni       = ini_states/storLow_forest_1999-12-31.map
interflowIni     = ini_states/interflow_forest_1999-12-31.map


